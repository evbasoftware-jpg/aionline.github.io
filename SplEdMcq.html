<title>Class Document Viewer</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f7ff;
padding:20px;
}

/* Container */

.container{
max-width:1200px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* Table */

.table-container{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
text-align:center;
}

th, td{
border:1px solid #ddd;
padding:5px;
}

th{
background:#0B5ED7;
color:white;
font-size:17px;
}

 .subject-row{
display:none;
overflow:hidden;
transition: all .4s ease;
}

.subject-row td{
padding:0;
transition:.3s;
}

.subject-row.open td{
padding:5px;
}

th{
cursor:pointer;
position:relative;
}

th::after{
content:"▼";
position:absolute;
right:10px;
transition:.3s;
}

th.active::after{
transform:rotate(180deg);
}
  
/* Buttons */

.btn{
display:block;
width:95%;
background:linear-gradient(90deg,#d7820b,#00C2FF);
color:white;
padding:5px;
margin:5px 0;
border:none;
border-radius:6px;
cursor:pointer;
font-size:19px;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* Controls */

.controls{
margin-top:20px;
text-align:center;
}

.controls button{
padding:8px 15px;
margin:5px;
background:#0B5ED7;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

/* Viewer */

.viewer-box{
overflow:auto;
border:2px solid #ddd;
margin-top:20px;
height:80vh;
}

iframe{
width:100%;
height:100%;
border:none;
transform-origin:0 0;
}
  
 /* Logo + Text */
.logo-box{
  position: static;
}

/* Logo */
.logo{
    height:67px;
    width:auto;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}
</style>

</head>

document.getElementById("viewer").style.transform="scale(1)";
}

  function toggleRow(id){
let row=document.getElementById(id);

row.classList.toggle("open");

if(row.classList.contains("open")){
row.style.display="table-row";
}else{
setTimeout(()=>{
row.style.display="none";
},300);
}
