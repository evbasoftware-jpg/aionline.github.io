<style>

body{
font-family:Arial, sans-serif;
background:#f4f7ff;
padding:20px;
}

/* Container */

.container{
max-width:1200px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* Table */

.table-container{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
text-align:center;
}

th, td{
border:1px solid #ddd;
padding:5px;
}

th{
background:#0B5ED7;
color:white;
font-size:15px;
}

/* Buttons */

.btn{
display:block;
width:100%;
background:linear-gradient(90deg,#d7820b,#00C2FF);
color:white;
padding:5px;
margin:5px 0;
border:none;
border-radius:6px;
cursor:pointer;
font-size:11px;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* Controls */

.controls{
margin-top:20px;
text-align:center;
}

.controls button{
padding:8px 15px;
margin:5px;
background:#0B5ED7;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

/* Viewer */

.viewer-box{
overflow:auto;
border:2px solid #ddd;
margin-top:20px;
height:80vh;
}

iframe{
width:100%;
height:100%;
border:none;
transform-origin:0 0;
}

</style>

function zoomIn(){
zoom+=0.1;
document.getElementById("viewer").style.transform="scale("+zoom+")";

function zoomOut(){

}

function resetZoom(){
zoom=1;
document.getElementById("viewer").style.transform="scale(1)";
}
