<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Online Shops Portal</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:15px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:#fff;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:4px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
width:100%;
padding:12px;
border:none;
background:#1976d2;
color:#fff;
border-radius:5px;
cursor:pointer;
}

.product{
background:#fff;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 1px 5px rgba(0,0,0,.1);
}

  input, select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
    margin-bottom:10px;
}

textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
margin-bottom:10px;
min-height:80px;
}
    
.callBtn{
background:green;
color:#fff;
padding:8px 12px;
text-decoration:none;
border-radius:5px;
display:inline-block;
margin-right:5px;
}

.waBtn{
background:#25D366;
color:#fff;
padding:8px 12px;
text-decoration:none;
border-radius:5px;
display:inline-block;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Shop & Product Registration Online</h2>

<label for="shopName">Shop Name</label>
<input id="shopName" placeholder="Enter Shop Name">

<label for="ownerName">Shop Owner Name</label>
<input id="ownerName" placeholder="Enter Shop Owner Name">

<label for="category">Business Category</label>

<select id="category">

<option value="">Select Business Category</option>

<option>Groceries</option>
<option>Fruits & Vegetables</option>
<option>Dairy Products</option>
<option>Bakery & Cakes</option>
<option>Food & Beverages</option>

<option>Fashion & Clothing</option>
<option>Men's Fashion</option>
<option>Women's Fashion</option>
<option>Kids Fashion</option>
<option>Footwear</option>

<option>Beauty & Cosmetics</option>
<option>Beauty Parlour</option>
<option>Health & Personal Care</option>

<option>Mobile & Accessories</option>
<option>Computer & Laptop</option>
<option>Electronics</option>
<option>Home Appliances</option>

<option>Furniture</option>
<option>Home Decor</option>
<option>Kitchen & Dining</option>

<option>Books & Stationery</option>
<option>Private Tuition</option>
<option>Coaching Centre</option>
<option>Sports & Fitness</option>
<option>Toys & Games</option>

<option>Jewelry & Watches</option>
<option>Gift Items</option>

<option>Pet Supplies</option>
<option>Agriculture Products</option>

<option>Medicine & Pharmacy</option>

<option>Automobile Parts</option>
<option>Hardware & Tools</option>

<option>Construction Materials</option>

<option>Handicrafts</option>
<option>Local Products</option>

<option>Tax Software</option>
<option>Tax Consultant</option>
<option>Income Tax Return</option>
<option>Other Software</option>
    
<option>Other</option>

</select>
  
<label for="productName">Product Name</label>
<input id="productName" placeholder="Enter Product Name">

<label for="price">Product Price</label>
<input id="price" placeholder="Enter Product Price">

<label for="weight">Product Weight</label>
<input id="weight" placeholder="Enter Product Weight">

<label for="expiryDate">Expiry Date of the Product</label>
<input type="date" id="expiryDate">

<label for="mobile">Mobile Number</label>
<input id="mobile" placeholder="Enter Mobile Number">

<label for="whatsapp">WhatsApp Number</label>
<input id="whatsapp" placeholder="Enter WhatsApp Number">

<label for="address">Address</label>
<input id="address" placeholder="Enter Address">

<label for="description">Brief Description of your Product</label>
<textarea id="description" placeholder="Product Description"></textarea>

<label for="location">Latitude & Longitude</label>
<input id="location" placeholder="22.7245,88.5632">

<label for="email">Email Address</label>
<input type="email" id="email" placeholder="Enter Email Address">

<label for="productImage">Product Image</label>
<input type="file" id="productImage" accept="image/*">  
   
<img id="preview"
style="max-width:100%;display:none;margin-top:10px;">
    
<input type="hidden" id="productId">

<button id="saveBtn" onclick="registerShop()">
Register Product
</button>

<p id="msg"></p>

</div>

<div class="card">

<input
id="searchBox"
placeholder="Search Product..."
onkeyup="searchProducts()">

</div>

<div id="productList"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw799u4AhtVQZd6IW2oB9oXu0LrCfND60Z5nw4jQeKYeM3rnDlXNdnj6gHY9zVgfkJw/exec";

async function registerShop(){

    let imageData = "";

const file =
document.getElementById("productImage").files[0];

if(file){

  imageData = await new Promise((resolve)=>{

    const reader = new FileReader();

    reader.onload = function(e){

      resolve(
        e.target.result.split(",")[1]
      );

    };

    reader.readAsDataURL(file);

  });

}
    
const data = {

id:
document.getElementById("productId").value,

shopName:
document.getElementById("shopName").value,

ownerName:
document.getElementById("ownerName").value,

category:
document.getElementById("category").value,

productName:
document.getElementById("productName").value,

price:
document.getElementById("price").value,

weight:
document.getElementById("weight").value,

expiryDate:
document.getElementById("expiryDate").value,

mobile:
document.getElementById("mobile").value,

whatsapp:
document.getElementById("whatsapp").value,

address:
document.getElementById("address").value,

description:
document.getElementById("description").value,

location:
document.getElementById("location").value,

email:
document.getElementById("email").value,

imageData:imageData,

};

let action;

if(document.getElementById("productId").value){

    action = "updateProduct";

}else{

    action = "registerShop";

}
    
const res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action: action,
data: data
})
});

const result = await res.json();

document.getElementById("msg").innerHTML =
result.message;

    
if(result.success){

document.getElementById("productId").value = "";
document.getElementById("shopName").value = "";
document.getElementById("ownerName").value = "";
document.getElementById("category").value = "";
document.getElementById("productName").value = "";
document.getElementById("price").value = "";
document.getElementById("weight").value = "";
document.getElementById("expiryDate").value = "";
document.getElementById("mobile").value = "";
document.getElementById("whatsapp").value = "";
document.getElementById("address").value = "";
document.getElementById("description").value = "";
document.getElementById("location").value = "";
document.getElementById("email").value = "";
document.getElementById("productImage").value = "";
document.getElementById("saveBtn").innerText = "Register Product";   
document.getElementById("preview").style.display = "none";
document.getElementById("preview").src = "";
    
    loadProducts();

}
    
}

async function loadProducts(){

const res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"getProducts"
})
});

const data = await res.json();

showProducts(data);

}

async function searchProducts(){

const keyword =
document.getElementById("searchBox").value;

const res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"searchProducts",
keyword:keyword
})
});

const data = await res.json();

showProducts(data);

}

function showProducts(data){

let html="";

data.forEach(item=>{

html += `
<div class="product">
    
${item.imageUrl ? `
<img
src="${item.imageUrl}"
style="
width:100%;
max-height:250px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;">
` : ""}
    
<h3>${item.productName}</h3>

<p><b>Shop:</b> ${item.shopName}</p>

<p><b>Category:</b> ${item.category}</p>

<p><b>Price:</b> ₹${item.price}</p>

<p><b>Weight:</b> ${item.weight}</p>

<p><b>Expiry:</b> ${
new Date(item.expiryDate).toLocaleDateString('en-GB')
}</p>

<p><b>Address:</b> ${item.address}</p>
    
<p><b>Description:</b> ${item.description || ""}</p>   
    
<a
class="callBtn"
target="_blank"
href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.location)}">
📍 Map
</a>
    
<a class="callBtn" href="tel:${item.mobile}">Call</a>

<a
class="waBtn"
target="_blank"
href="https://wa.me/${item.whatsapp}?text=Hello, I found your product in aionline.net.in, I am interested in ${encodeURIComponent(item.productName)}}">
WhatsApp
</a>

<a
class="callBtn"
href="mailto:${item.email}">
📧 Email
</a>

<button onclick="loadProduct('${item.id}')">
✏️ Edit
</button>
    
</div>
`;

});

document.getElementById("productList").innerHTML =
html;

}

loadProducts();

async function loadProduct(id){

const res = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"getProductById",
id:id
})
});

const result = await res.json();

if(!result.success) return;

const p = result.product;

document.getElementById("productId").value = p.id;
document.getElementById("shopName").value = p.shopName;
document.getElementById("ownerName").value = p.ownerName;
document.getElementById("category").value = p.category;
document.getElementById("productName").value = p.productName;
document.getElementById("price").value = p.price;
document.getElementById("weight").value = p.weight;
    
document.getElementById("expiryDate").value =
p.expiryDate
? new Date(p.expiryDate).toISOString().split("T")[0]
: "";
    
document.getElementById("mobile").value = p.mobile;
document.getElementById("whatsapp").value = p.whatsapp;
document.getElementById("address").value = p.address;
document.getElementById("description").value = p.description;
document.getElementById("location").value = p.location;
document.getElementById("email").value = p.email;

window.scrollTo(0,0);

document.getElementById("saveBtn").innerText =
"Update Product";

if(p.imageUrl){
document.getElementById("preview").src =
p.imageUrl;
document.getElementById("preview").style.display =
"block";
}
    
}
    

document.getElementById("productImage")
.addEventListener("change",function(){

const file = this.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

document.getElementById("preview").src = e.target.result;
document.getElementById("preview").style.display = "block";

};

reader.readAsDataURL(file);

}

});
    
</script>

</body>
</html>
