<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Salary Statement</title>

<style>

body{
font-family: Arial;
padding:20px;
}

table{
border-collapse: collapse;
width:100%;
}

th,td{
border:1px solid #000;
padding:5px;
text-align:center;
}

  /* Gross Pay column color*/
#salaryTable th:nth-child(8),
#salaryTable td:nth-child(8){
    background-color: #fcf0d2;
}
  
  /* Net Pay column color*/
#salaryTable th:nth-child(13),
#salaryTable td:nth-child(13){
    background-color: #fbd9ff;
}
  
input{
width:100%;
border:none;
text-align:center;
}
  
.info-table input{
text-align:left;
}
  
button{
padding:8px 20px;
margin-bottom:10px;
font-size:16px;
}
  
     /* Logo + Text */
.logo-box{
  position: static;
}

/* Logo */
.logo{
    height:57px;
    width:auto;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}
  
@media print{

button{
display:none;
}

a{
display:none;
}

/* Month column */
#salaryTable th:first-child,
#salaryTable td:first-child{
    width: 140px !important;
    min-width: 140px !important;
    white-space: nowrap;
}

/* Table auto size */
#salaryTable{
    table-layout: auto;
    width: 100%;
}

/* Month input */
#salaryTable td:first-child input{
    text-align:left;
    font-size:14px;
}

}

</style>

</head>

<body>
<div class="logo-box" >
     <img src="logo.png" alt="AI Online Logo" class="logo">
</div>
  https://aionline.in.net/
<h2 id="title" style="position:relative; left:50%; transform:translateX(-50%); width:max-content;">
</h2>
  
<table class="info-table"; style="margin-bottom:10px; width:100%; white-space:nowrap;">
<tr>
<td style="width:117px;">Name of Employee:</td>
<td><input ></td>
</tr>

<tr>
<td>Name of the Office :</td>
<td><input></td>
</tr>
   
<tr>
<td>Designation :</td>
<td><input></td>
</tr>
   
<tr>
<td>PAN :</td>
<td><input></td>
</tr>
   
<tr>
<td>Gender :</td>
<td><input></td>
</tr>
   
<tr>
<td>Mobile :</td>
<td><input></td>
</tr>
</table>
  
<table id="salaryTable">

<tr style="background-color: #d9fffc;">
<th style="width:107px;">Month</th>
<th>Basic</th>
<th>Addl Allow</th>
<th>DA</th>
<th>HRA</th>
<th>MA</th>
<th>Conv Allow</th>
<th>Gross Pay</th>
<th>GPF</th>
<th>GSLI</th>
<th>P.Tax</th>
<th>I.Tax</th>
<th>Net Pay</th>
</tr>

<tbody id="salaryBody"></tbody>

<tr>
<td>Bonus</td>
<td colspan="6"></td>
<td><input id="bonusGross" oninput="bonusCalc()"></td>
<td colspan="4"></td>
<td id="bonusNet">0</td>
</tr>

<tr>
<td>Arrear</td>
<td colspan="6"></td>
<td><input id="arrearGross" oninput="bonusCalc()"></td>
<td colspan="4"></td>
<td id="arrearNet">0</td>
</tr>

<tr style="background-color: #fcffd9;">
<th>TOTAL</th>

<th id="t1"></th>
<th id="t2"></th>
<th id="t3"></th>
<th id="t4"></th>
<th id="t5"></th>
<th id="t6"></th>
<th id="t7"></th>
<th id="t8"></th>
<th id="t9"></th>
<th id="t10"></th>
<th id="t11"></th>
<th id="t12"></th>

</tr>

</table>

 
  <br><br>
<button onclick="window.print()" style="background-color: orange; color: blue; font-size:27px; font-weight: bold;">Print / PDF</button>
<br>
  
<script>

  const DA_DATA = [
["1987-03-01",4],["1987-12-01",8],["1988-06-01",13],["1989-02-01",18],["1989-06-01",23],["1989-11-01",29],["1990-06-01",34],["1990-12-01",38],["1991-04-01",43],["1992-01-01",51],["1992-11-01",60],["1993-07-01",71],["1993-12-01",83],["1994-05-01",92],["1994-11-01",97],["1995-02-01",104],["1995-06-01",114],["1995-12-01",125],["1996-04-01",136],["1996-10-01",148],["1997-08-01",159],["1997-12-01",170],["1998-04-01",182.4],["1997-04-01",0],["1997-08-01",4],["1997-12-01",8],["1998-04-01",13],["1998-11-01",22],["1999-08-01",32],["2000-04-01",37],["2000-10-01",38],["2001-07-01",41],["2003-07-01",45],["2004-09-01",49],["2005-04-01",52],["2005-09-01",55],["2005-12-01",59],["2006-03-01",61],["2006-07-01",64],["2006-09-01",67],["2007-01-01",71],["2007-04-01",24],["2008-01-01",29],["2008-06-01",35],["2008-11-01",41],["2009-03-01",47],["2008-04-01",2],["2008-06-01",6],["2008-11-01",9],["2009-03-01",12],["2009-04-01",16],["2009-12-01",22],["2010-04-01",27],["2010-12-01",35],["2012-01-01",45],["2013-01-01",52],["2014-01-01",58],["2015-01-01",65],["2016-01-01",75],["2017-01-01",85],["2018-01-01",100],["2019-01-01",125],["2020-01-01",0],["2021-01-01",3],["2023-03-01",6],["2024-01-01",10],["2024-04-01",14],["2025-04-01",18],["2026-04-01",22]
];
  
let months=[
"March","April","May","June","July",
"August","September","October",
"November","December","January","February"
];

let year=2025;
  
  function getDAPercentage(dateStr){

let daPercent = 0;

for(let i=0;i<DA_DATA.length;i++){
    if(new Date(DA_DATA[i][0]) <= new Date(dateStr)){
        daPercent = DA_DATA[i][1];
    }
}

return daPercent;
}

function updateDA(el){

let row=el.parentNode.parentNode;
let startIndex=row.rowIndex-1;

document.querySelectorAll("#salaryBody tr").forEach((r,i)=>{

if(i>=startIndex){

// Basic Copy
r.cells[1].querySelector("input").value=el.value;

let basic=Number(el.value)||0;

let monthYear=r.cells[0].querySelector("input").value;

let parts=monthYear.split(",");
let monthName=parts[0].trim();
let yearValue=parseInt(parts[1]);

const monthMap={
January:1, February:2, March:3, April:4,
May:5, June:6, July:7, August:8,
September:9, October:10, November:11, December:12
};

let monthNo=monthMap[monthName];

let dateStr=
yearValue+"-"+
String(monthNo).padStart(2,"0")+
"-01";

let daPercent=getDAPercentage(dateStr);

let daAmount=Math.round(basic*daPercent/100);

// DA Column
r.cells[3].querySelector("input").value=daAmount;

  
let hraPercent=getHRAPercentage(dateStr);

let hraAmount=Math.round(basic*hraPercent/100);

// HRA Column
r.cells[4].querySelector("input").value=hraAmount;
  
  
}

});
updatePTAX();
calcAll();
}
  
function getHRAPercentage(dateStr){

let d = new Date(dateStr);

if(d >= new Date("2020-01-01")){
    return 12;
}
else if(d >= new Date("2006-03-01")){
    return 15;
}

return 0;

}
  
function updatePTAX(){

document.querySelectorAll("#salaryBody tr").forEach(r=>{

let basic=Number(r.cells[1].querySelector("input").value)||0;
let addl=Number(r.cells[2].querySelector("input").value)||0;
let da=Number(r.cells[3].querySelector("input").value)||0;
let hra=Number(r.cells[4].querySelector("input").value)||0;
let ma=Number(r.cells[5].querySelector("input").value)||0;
let conv=Number(r.cells[6].querySelector("input").value)||0;

let gross=basic+addl+da+hra+ma+conv;

r.cells[10].querySelector("input").value =
getDefaultPTAX(gross);

});

}
  
function getDefaultPTAX(gross) {
    if (gross <= 6000) return 40;
    if (gross <= 7000) return 45;
    if (gross <= 8000) return 50;
    if (gross <= 9000) return 90;
    if (gross <= 15000) return 110;
    if (gross <= 25000) return 130;
    if (gross <= 40000) return 150;
    return 200;
}
  
function createTable(){

let tbody=document.getElementById("salaryBody");

months.forEach((m,i)=>{

let displayYear = year;

if(i>=10){
displayYear = year + 1;
}

let row=document.createElement("tr");

row.innerHTML=`

<td>
<input value="${m}, ${displayYear}" onchange="updateYear(this)">
</td>

<td><input oninput="updateDA(this)"></td>
<td><input oninput="copyDown(this)"></td>
<td><input oninput="copyDown(this)"></td>
<td><input oninput="copyDown(this)"></td>
<td><input oninput="copyDown(this)"></td>
<td><input oninput="copyDown(this)"></td>

<td class="gross">0</td>

<td><input oninput="copyDown(this)"></td>
<td><input oninput="copyDown(this)"></td>
<td><input oninput="copyDown(this)"></td>
<td><input oninput="copyDown(this)"></td>

<td class="net">0</td>

`;

tbody.appendChild(row);

});

}

createTable();
calcAll();

function copyDown(el){

let row = el.parentNode.parentNode;

let rows = Array.from(
document.querySelectorAll("#salaryBody tr")
);

let index = rows.indexOf(row);

let col = el.parentNode.cellIndex;

rows.forEach((r,i)=>{

    if(i >= index){

        let cell = r.cells[col];

        if(cell && cell.querySelector("input")){
            cell.querySelector("input").value = el.value;
        }

    }

});

updatePTAX();
calcAll();

}

function updateYear(el){

let y=parseInt(el.value.split(",")[1].trim());

year = y;   // <-- year update

document.querySelectorAll("#salaryBody tr").forEach((r,i)=>{

let yearValue=y;

if(i>=10) yearValue=y+1;

r.cells[0].children[0].value=months[i]+", "+yearValue;

});

// Title Update

calcAll();

document.getElementById("title").innerText =
"Salary Statement for the Financial Year " + year + "-" + (year+1);

  let firstBasic =
document.querySelector("#salaryBody tr td:nth-child(2) input");

if(firstBasic){
    updateDA(firstBasic);
}
}

function calc(row){

let inputs=row.querySelectorAll("input");

let basic=Number(inputs[1].value)||0;
let addl=Number(inputs[2].value)||0;
let da=Number(inputs[3].value)||0;
let hra=Number(inputs[4].value)||0;
let ma=Number(inputs[5].value)||0;
let conv=Number(inputs[6].value)||0;

let gpf  = Number(inputs[7].value)||0;
let gsli = Number(inputs[8].value)||0;
let ptax = Number(inputs[9].value)||0;
let itax = Number(inputs[10].value)||0;

let gross=basic+addl+da+hra+ma+conv;
let net=gross-gpf-gsli-ptax-itax;

row.querySelector(".gross").textContent = gross;
row.querySelector(".net").textContent = net;

}

function calcAll(){
document.querySelectorAll("#salaryBody tr").forEach(r=>calc(r));
total();
}

function bonusCalc(){

let b=Number(document.getElementById("bonusGross").value)||0;
let a=Number(document.getElementById("arrearGross").value)||0;

document.getElementById("bonusNet").innerText=b;
document.getElementById("arrearNet").innerText=a;

total();

}

function total(){

let cols=12;

for(let i=1;i<=cols;i++){

let sum=0;

document.querySelectorAll("#salaryBody tr").forEach(r=>{

let val;

if(i==7)
val=Number(r.querySelector(".gross").innerText)||0;

else if(i==12)
val=Number(r.querySelector(".net").innerText)||0;

else
val=Number(r.cells[i].querySelector("input")?.value)||0;

sum+=val;

});

if(i==7 || i==12){
sum+=Number(document.getElementById("bonusGross").value)||0;
sum+=Number(document.getElementById("arrearGross").value)||0;
}

document.getElementById("t"+i).innerText=sum;

}

}
  
document.getElementById("title").innerText=
"Salary Statement for the Financial Year " + year + "-" + (year+1);

</script>
