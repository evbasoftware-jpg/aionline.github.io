<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AI Online Digital Mall</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
radial-gradient(circle at top,#182848,#050510);
min-height:100vh;
padding:40px 15px;
overflow-x:hidden;
}

/* Header */

.mall-header{
text-align:center;
margin-bottom:50px;
}

.mall-title{
font-size:55px;
font-weight:700;
color:#fff;
text-transform:uppercase;

text-shadow:
0 0 10px #00eaff,
0 0 20px #00eaff,
0 0 40px #00eaff,
0 0 80px #00eaff;
}

.mall-sub{
color:#ccc;
font-size:18px;
margin-top:10px;
}

/* Mall */

.mall{
max-width:1400px;
margin:auto;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:30px;
}

/* Shop */

.shop{
position:relative;
perspective:1200px;
cursor:pointer;
transition:.4s;
}

.shop:hover{
transform:translateY(-8px);
}

/* Sign Board */

.sign-board{
height:90px;

background:
linear-gradient(135deg,#00eaff,#0066ff);

border-radius:15px 15px 0 0;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

color:white;
font-weight:700;

box-shadow:
0 0 20px #00eaff,
0 0 40px #00eaff;
}

.sign-board span{
font-size:12px;
margin-top:5px;
}

/* Shop Front */

.shop-front{
position:relative;
height:300px;

background:
linear-gradient(
180deg,
#353535,
#121212);

overflow:hidden;

border-radius:0 0 20px 20px;

box-shadow:
0 20px 40px rgba(0,0,0,.6);
}

/* Interior */

.interior{

position:absolute;
inset:0;

display:flex;
align-items:center;
justify-content:center;

background:
radial-gradient(circle,
rgba(255,255,255,.25),
transparent 70%);

}

.open-btn{

padding:10px 25px;

background:#00c853;

border-radius:30px;

color:white;
font-weight:700;

box-shadow:
0 0 15px #00c853;

}

/* Glass Door */

.door{

position:absolute;
top:0;

width:50%;
height:100%;

background:
linear-gradient(
120deg,
rgba(255,255,255,.25),
rgba(255,255,255,.05));

backdrop-filter:blur(4px);

border:1px solid rgba(255,255,255,.3);

transition:1s ease;
}

.left{
left:0;
transform-origin:left;
}

.right{
right:0;
transform-origin:right;
}

/* Reflection */

.door:before{

content:"";

position:absolute;

top:0;
left:20px;

width:40px;
height:100%;

background:
rgba(255,255,255,.15);

transform:skewX(-20deg);
}

/* Open Door */

.shop.open .left{
transform:rotateY(-120deg);
}

.shop.open .right{
transform:rotateY(120deg);
}

/* Floor Reflection */

.shop:after{

content:"";

position:absolute;

left:0;
right:0;

height:120px;

bottom:-120px;

background:inherit;

opacity:.15;

filter:blur(20px);

transform:
scaleY(-1);
}

/* Mobile */

@media(max-width:768px){

.mall-title{
font-size:32px;
}

.shop-front{
height:240px;
}

}

</style>
</head>

<body>

<div class="mall-header">

<h1 class="mall-title">
AI ONLINE DIGITAL MALL
</h1>

<p class="mall-sub">
Smart Digital & AI Based Services
</p>

</div>

<div class="mall">

<div class="shop"
data-link="https://aionline.in.net/GPF_CALCULATOR.html">

<div class="sign-board">
GPF CALCULATOR
<span>SHOP NO-01</span>
</div>

<div class="shop-front">

<div class="door left"></div>
<div class="door right"></div>

<div class="interior">
<div class="open-btn">
OPEN NOW
</div>
</div>

</div>

</div>

<div class="shop"
data-link="https://aionline.in.net/SalaryStatement.html">

<div class="sign-board">
SALARY STATEMENT
<span>SHOP NO-02</span>
</div>

<div class="shop-front">

<div class="door left"></div>
<div class="door right"></div>

<div class="interior">
<div class="open-btn">
OPEN NOW
</div>
</div>

</div>

</div>

<div class="shop"
data-link="https://aionline.in.net/pension_Gratuity_Commutation.html">

<div class="sign-board">
PENSION
<span>SHOP NO-03</span>
</div>

<div class="shop-front">

<div class="door left"></div>
<div class="door right"></div>

<div class="interior">
<div class="open-btn">
OPEN NOW
</div>
</div>

</div>

</div>

</div>

<script>

document.querySelectorAll(".shop")
.forEach(shop=>{

shop.addEventListener("click",function(){

if(this.classList.contains("open"))
return;

this.classList.add("open");

let url=this.dataset.link;

setTimeout(()=>{
window.location.href=url;
},1200);

});

});

</script>

</body>
</html>
