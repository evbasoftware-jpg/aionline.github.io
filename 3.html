<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nifty AI Signal Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:#fff;
    padding:20px;
}
h1{text-align:center;}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin:10px 0;
}

.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

.value{
    font-size:22px;
    font-weight:bold;
}

.buy{color:#22c55e;}
.sell{color:#ef4444;}
.wait{color:#facc15;}

table{
    width:100%;
    border-collapse:collapse;
}
td,th{
    padding:8px;
    border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<h1>📊 NIFTY AI SIGNAL DASHBOARD</h1>

<div class="grid">
    <div class="card">
        <div>Nifty Price</div>
        <div class="value" id="price">--</div>
    </div>

    <div class="card">
        <div>RSI</div>
        <div class="value" id="rsi">--</div>
    </div>

    <div class="card">
        <div>Signal</div>
        <div class="value" id="signal">--</div>
    </div>
</div>

<div class="card">
    <h3>📜 Signal History</h3>
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Price</th>
                <th>Signal</th>
            </tr>
        </thead>
        <tbody id="history"></tbody>
    </table>
</div>

<script>
let prices = [];
let historyData = [];

async function fetchData(){
    try{
        let res = await fetch("https://api.polygon.io/v2/aggs/ticker/I:NDX/prev?adjusted=true&apiKey=demo");

        let data = await res.json();

        // fallback demo data convert (since demo key limited)
        let price = data.results?.[0]?.c;

        if(!price){
            throw "No data";
        }

        // fake history create (for indicators)
        prices.push(price);

        if(prices.length > 50) prices.shift();

        calculate();

    }catch(e){
        console.log("Error:", e);

        // fallback (so UI never breaks)
        let fake = 22000 + Math.random()*100;
        prices.push(fake);

        if(prices.length > 50) prices.shift();

        calculate();
    }
}

function calculateRSI(prices, period=14){
    if(prices.length < period) return 50;

    let gains = 0, losses = 0;

    for(let i=prices.length-period; i<prices.length; i++){
        let diff = prices[i] - prices[i-1];
        if(diff>0) gains += diff;
        else losses -= diff;
    }

    let rs = gains / losses;
    return 100 - (100/(1+rs));
}

function calculate(){
    let current = prices[prices.length-1];

    let rsi = calculateRSI(prices);

    // Bollinger
    let slice = prices.slice(-20);
    let avg = slice.reduce((a,b)=>a+b,0)/20;

    let std = Math.sqrt(slice.map(x=>Math.pow(x-avg,2)).reduce((a,b)=>a+b)/20);

    let upper = avg + 2*std;
    let lower = avg - 2*std;

    let signal = "WAIT";

    if(current <= lower && rsi < 35){
        signal = "BUY";
    }
    else if(current >= upper && rsi > 65){
        signal = "SELL";
    }

    updateUI(current, rsi, signal);
}

let lastSignal = "";

function updateUI(price, rsi, signal){

    if(signal !== lastSignal && signal !== "WAIT"){
        addHistory(price, signal);
        lastSignal = signal;
    }

    document.getElementById("price").innerText = price.toFixed(2);
    document.getElementById("rsi").innerText = rsi.toFixed(2);

    let el = document.getElementById("signal");
    el.innerText = signal;

    el.className = "value " +
        (signal==="BUY"?"buy":
        signal==="SELL"?"sell":"wait");
}

function addHistory(price, signal){
    let time = new Date().toLocaleTimeString();

    historyData.unshift({time, price, signal});

    if(historyData.length > 20) historyData.pop();

    let html = "";
    historyData.forEach(row=>{
        html += `
        <tr>
            <td>${row.time}</td>
            <td>${row.price.toFixed(2)}</td>
            <td class="${row.signal==='BUY'?'buy':'sell'}">${row.signal}</td>
        </tr>`;
    });

    document.getElementById("history").innerHTML = html;
}

// Auto refresh
setInterval(fetchData, 60000);
fetchData();

</script>

</body>
</html>
