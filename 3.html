<!DOCTYPE html>
<html>
<head>
<title>PRO Trading Dashboard</title>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;padding:20px;}
h1{text-align:center;}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:15px;
}

.card{
 background:#1e293b;
 padding:15px;
 border-radius:10px;
}

.buy{color:#22c55e;}
.sell{color:#ef4444;}
.wait{color:#facc15;}

.value{font-size:20px;font-weight:bold;}
</style>
</head>

<body>

<h1>🚀 PRO TRADING DASHBOARD</h1>

<div class="grid" id="data"></div>

<script>

const API = "https://nifty-backend-0ij2.onrender.com/api/market";

async function load(){
    try{
        let res = await fetch(API);
        let data = await res.json();

        let html = "";

        data.forEach(d=>{
            html += `
            <div class="card">
                <h3>${d.symbol}</h3>
                <div>Price: <span class="value">${d.price.toFixed(2)}</span></div>
                <div>RSI: ${d.rsi.toFixed(2)}</div>
                <div class="value ${d.signal.toLowerCase()}">${d.signal}</div>
            </div>
            `;
        });

        document.getElementById("data").innerHTML = html;

    }catch(e){
        document.getElementById("data").innerHTML = "⚠️ API Error";
    }
}

setInterval(load, 10000);
load();

</script>

</body>
</html>
