<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Teacher profile PDF To Excel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    
<style>
body{
    font-family:Arial;
    padding:20px;
}

table{
    border-collapse:collapse;
    width:100%;
    margin-top:15px;
}

th,td{
    border:1px solid #000;
    padding:5px;
}

button{
    padding:10px 15px;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>Upload Single / Multiple PDF of Teacher Prifile to download in Excel</h2>

<input type="file"
       id="pdfFiles"
       accept=".pdf"
       multiple>

<button onclick="processPDFs()">
Extract
</button>

<button onclick="downloadExcel()">
Download Excel
</button>

<div id="preview"></div>
    
<div id="progressContainer" style="
display:none;
width:100%;
background:#ddd;
margin-top:15px;
border-radius:5px;
overflow:hidden;
">

<div id="progressBar" style="
width:0%;
height:25px;
background:#4CAF50;
color:white;
text-align:center;
line-height:25px;
font-weight:bold;
">
0%
</div>

</div>

<div id="progressText" style="
margin-top:5px;
font-weight:bold;
"></div>

<script>

    const HEADERS = [
"Circle",
"School Name",
"Name",
"Code",
"Date of Birth",
"Sex",
"Caste",
"Voter ID No",
"Designation",
"Date of Retirement",
"Date of first joining in this service",
"Date of joining the present post",
"Date Of First Joining In The Present School At Present Post",
"Date of joining the present school",
"Approval Qualification",
"Additional Qualification",
"Approval of Appointment Number",
"Employee Group",
"Approval of Appointment Date",
"Basic Pay",
"Level",
"Cell",
"Category Of Teacher",
"Bank Name",
"MICR No",
"Bank Branch",
"Bank Branch Code",
"Bank Account No",
"Bank IFSC Code",
"Father's Name",
"Mother's Name",
"Religion",
"Mother Tongue",
"Opted For Swastha Sathi Scheme",
"Marital status",
"Spouse Name",
"Employment Details",
"Spouse pay",
"Spouse HRA",
"Spouse opted for enrolment in West Bengal Health Scheme",
"Residential Status",
"PAN no",
"Aadhar ID no",
"Assembly Constituency No.",
"Assembly Part No",
"Voter sl.No. in the part",
"Blood Group",
"Whether Differently Able",
"State details",
"Height (In Inch)",
"Identification Mark",

"Present State",
"Present House No.",
"Present Street",
"Present Town/ Village",
"Present Post Office",
"Present PIN",
"Present District",
"Present Sub Division",
"Present Block",
"Present Police Station",

"Permanent State",
"Permanent House No.",
"Permanent Street",
"Permanent Town/ Village",
"Permanent Post Office",
"Permanent PIN",
"Permanent District",
"Permanent Sub Division",
"Permanent Block",
"Permanent Police Station",

"Land Tel. No",
"Mobile No.",
"Email Id",

"Professional Qualification",
"Year of possessing the professional qualification",

"Previous District",
"Previous Circle",
"Previous School",
"Previous Designation",
"Previous Qualification",
"Previous From Date",
"Previous To Date",
"Previous Transfer Memo No.",
"Previous Transfer Memo No. Date",
    
"Status of previous of employment, if any",
"Opted Under DCRB Scheme", 
"If opted under post 1981 pension",   
 "Option Exercise Under",   
 "Date of refund of employer's share of CPF to the Govt. Treasury",   
 "Name of Treasury",   
 "Amount Refunded",   
 "Whether any Court Case filed by the employee in connection with his/her service is pending before the Hon'ble Court",
 "PDF File"
];
    
let finalRows=[];
let allHeaders=new Set();

async function processPDFs(){

    const files =
    document.getElementById("pdfFiles").files;

    if(files.length===0){
        alert("Select PDF");
        return;
    }

    finalRows=[];
    allHeaders.clear();

    const total = files.length;

    for(let i=0;i<total;i++){

        const file = files[i];

        updateProgress(
            (i/total)*100,
            `Extracting PDF ${i+1} of ${total}`
        );

        let text =
        await extractText(file);

        let row =
        parseKeyValue(text);

        row["PDF File"]=file.name;

        Object.keys(row)
        .forEach(h=>allHeaders.add(h));

        finalRows.push(row);
    }

    updateProgress(
        100,
        "PDF Extraction Completed"
    );

    showTable();
}

async function extractText(file){

    const buffer=
    await file.arrayBuffer();

    const pdf=
    await pdfjsLib
    .getDocument(
      new Uint8Array(buffer)
    ).promise;

    let fullText="";

    for(let p=1;p<=pdf.numPages;p++){

        const page=
        await pdf.getPage(p);

        const content=
        await page.getTextContent();

        fullText +=
    content.items
    .map(x => x.str)
    .join("\n");

        fullText+="\n";
    }

    return fullText;
}

function parseKeyValue(text){

    const obj = {};
    
    const previousBlock = text.match(
/DETAILS OF PREVIOUS EMPLOYMENT(.*?)(?:Status of previous of employment, if any|Opted Under DCRB Scheme|$)/is);
    
    if(previousBlock){

    let pText = previousBlock[1]
        .replace(/\s+/g," ")
        .trim();

    console.log("PREVIOUS =", pText);

    pText = pText.replace(
        /^District\s+Circle\s+School\s+Designation\s+Qualification\s+From\s+Date\s+To\s+Date\s+Transfer\s+Memo\s+No\.\s+Transfer\s+Memo\s+No\.\s+Date\s*/i,
        ""
    );

    console.log("AFTER CLEAN =", pText);
const dateMatches = pText.match(/\d{2}-\d{2}-\d{4}/g);

if(dateMatches && dateMatches.length >= 3){

    obj["Previous From Date"] = dateMatches[0];
    obj["Previous To Date"] = dateMatches[1];
    obj["Previous Transfer Memo No. Date"] = dateMatches[2];

    const beforeDates = pText.split(dateMatches[0])[0].trim();

    const memoMatch = pText.match(
        /([A-Z]+\/[A-Z]+\/[0-9()\/]+\/[0-9]+)/i
    );

    if(memoMatch){
        obj["Previous Transfer Memo No."] = memoMatch[1];
    }

    const desigMatch = beforeDates.match(
        /\b(AT|HM|AHM|TIC)\b/
    );

    if(desigMatch){

        obj["Previous Designation"] = desigMatch[1];

        const parts = beforeDates.split(desigMatch[1]);

        const left = parts[0].trim();
        const right = parts[1].trim();

        const leftWords = left.split(/\s+/);

        obj["Previous District"] = leftWords[0] || "";
        obj["Previous Circle"] = leftWords[1] || "";

        obj["Previous School"] =
            leftWords.slice(2).join(" ");

        obj["Previous Qualification"] = right;
    }
}
}
    
    const presentBlock = text.match(
/PRESENT ADDRESS(.*?)(?:PERMANENT ADDRESS|CONTACT DETAILS)/is
);

const permanentBlock = text.match(
/PERMANENT ADDRESS(.*?)(?:CONTACT DETAILS|PROFESSIONAL DETAILS)/is
);
    
    

    // PRESENT ADDRESS
if(presentBlock){

    const pText = presentBlock[1];

    const fields = [
        "State",
        "House No.",
        "Street",
        "Town/ Village",
        "Post Office",
        "PIN",
        "District",
        "Sub Division",
        "Block",
        "Police Station"
    ];

    fields.forEach((field,index)=>{

        const next = fields.slice(index+1)
            .map(f=>f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'))
            .join("|");

        const rx = new RegExp(
            field.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') +
            "\\s*:\\s*(.*?)\\s*(?=(" +
            next +
            ")\\s*:|$)",
            "is"
        );

        const m = pText.match(rx);

        if(m){
            obj["Present " + field] = m[1].trim();
        }
    });
}
    
  // PERMANENT ADDRESS
if(permanentBlock){

    const pText = permanentBlock[1];

    const fields = [
        "State",
        "House No.",
        "Street",
        "Town/ Village",
        "Post Office",
        "PIN",
        "District",
        "Sub Division",
        "Block",
        "Police Station"
    ];

    fields.forEach((field,index)=>{

        const next = fields.slice(index+1)
            .map(f=>f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'))
            .join("|");

        const rx = new RegExp(
            field.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') +
            "\\s*:\\s*(.*?)\\s*(?=(" +
            next +
            ")\\s*:|$)",
            "is"
        );

        const m = pText.match(rx);

        if(m){
            obj["Permanent " + field] = m[1].trim();
        }
    });
}  
    
    // Extra spaces clean
    text = text.replace(/\s+/g, " ").trim();

    
    
    // Circle
    const originalText = text;

    const circleMatch = originalText.match(
        /([A-Z0-9()\-]+(?:\s+[A-Z0-9()\-]+)*\s+CIRCLE,\s*[A-Z]+)/i);

    text = text.replace(/\s+/g, " ").trim();
    
if(circleMatch){

    obj["Circle"] = circleMatch[1]
        .replace(/^OF\s+WB\s+/i,"")
        .trim();
}

const schoolMatch = text.match(
/CIRCLE,\s*[A-Z\s]+?\s+([A-Z]+(?:\s+[A-Z]+)*\s+(?:PRIMARY SCHOOL|JUNIOR BASIC SCHOOL|HIGH SCHOOL|MADRASAH))/i
);

if(schoolMatch){
    obj["School Name"] = schoolMatch[1].trim();
}

   
    for(let i=0;i<HEADERS.length;i++){

        const current = HEADERS[i];

        const nextHeaders = HEADERS
            .slice(i+1)
            .map(h => h.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'))
            .join("|");

        let regex;

        if(nextHeaders){

            regex = new RegExp(
    current.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') +
    "\\s*:\\s*(.*?)\\s*(?=(" + nextHeaders +
")\\s*:|PERSONAL DETAILS|PERMANENT ADDRESS|CONTACT DETAILS|PROFESSIONAL DETAILS|DETAILS OF PREVIOUS EMPLOYMENT|Finalized By DPSC|osms\\.wbsed\\.gov\\.in|$)",
    "i"
);

        }else{

            regex = new RegExp(
                current.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') +
                "\\s*:\\s*(.*)$",
                "i"
            );
        }

        const match = text.match(regex);

        if(match){

            obj[current] = match[1]
                .replace(/\s+/g," ")
                .trim();
        }
    }

    return obj;
}

function showTable(){

    let headers = HEADERS;

    let html="<table>";

    html+="<tr>";

    headers.forEach(h=>{
        html+="<th>"+h+"</th>";
    });

    html+="</tr>";

    finalRows.forEach(r=>{

        html+="<tr>";

        headers.forEach(h=>{

            html+="<td>"+(r[h]||"")+"</td>";

        });

        html+="</tr>";
    });

    html+="</table>";

    document
    .getElementById("preview")
    .innerHTML=html;
}

async function downloadExcel(){

    updateProgress(
    0,
    "Preparing Excel File...");
    
    if(finalRows.length===0){
        alert("No Data");
        return;
    }

    let headers = HEADERS;

    const workbook = new ExcelJS.Workbook();
    const worksheet = workbook.addWorksheet("Employee Data");

    worksheet.addRow(headers);
worksheet.getRow(1).font = {bold:true};

updateProgress(
    30,
    "Writing Data..."
);

finalRows.forEach(r=>{
    worksheet.addRow(
        headers.map(h => r[h] || "")
    );
});

updateProgress(
    60,
    "Formatting Excel..."
);

    worksheet.eachRow(row => {
    row.eachCell(cell => {
        cell.alignment = {
            wrapText: true,
            vertical: "middle"
        };
    });
});
    
    worksheet.eachRow((row)=>{
        row.eachCell((cell)=>{

            cell.border = {
                top:{style:'thin'},
                left:{style:'thin'},
                bottom:{style:'thin'},
                right:{style:'thin'}
            };

        });
    });

    worksheet.columns.forEach(column => {

    let maxLength = 0;

    column.eachCell({ includeEmpty: true }, cell => {

        const value = cell.value ? String(cell.value) : "";

        maxLength = Math.max( maxLength,value.length ); });

    column.width = Math.min(
        Math.max(maxLength + 2, 10),40);});
    
    updateProgress(
    80,
    "Generating Excel..."
);
    
    const buffer = await workbook.xlsx.writeBuffer();

    updateProgress(
    100,
    "Excel Download Ready"
);
    
    const blob = new Blob([buffer],{type:
            "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});

    const link =
        document.createElement("a");

    link.href =
        URL.createObjectURL(blob);

    link.download =
        "Teacher_profile_PDF_To_Excel.xlsx";

    link.click();
}

    function updateProgress(percent,text=""){

    const bar =
    document.getElementById("progressBar");

    const container =
    document.getElementById("progressContainer");

    const txt =
    document.getElementById("progressText");

    container.style.display="block";

    bar.style.width = percent + "%";
    bar.innerText = Math.round(percent) + "%";

    txt.innerText = text;

    if(percent>=100){

        setTimeout(()=>{
            container.style.display="none";
            bar.style.width="0%";
            bar.innerText="0%";
            txt.innerText="";
        },1500);
    }
}
    
</script>

</body>
</html>
