<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Multi PDF To Excel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial;
    padding:20px;
}

table{
    border-collapse:collapse;
    width:100%;
    margin-top:15px;
}

th,td{
    border:1px solid #000;
    padding:5px;
}

button{
    padding:10px 15px;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>Single / Multiple PDF → Excel</h2>

<input type="file"
       id="pdfFiles"
       accept=".pdf"
       multiple>

<button onclick="processPDFs()">
Extract
</button>

<button onclick="downloadExcel()">
Download Excel
</button>

<div id="preview"></div>

<script>

let finalRows=[];
let allHeaders=new Set();

async function processPDFs(){

    const files=
    document.getElementById("pdfFiles").files;

    if(files.length===0){
        alert("Select PDF");
        return;
    }

    finalRows=[];
    allHeaders.clear();

    for(const file of files){

        let text=
        await extractText(file);

        let row=
        parseKeyValue(text);

        row["PDF File"]=file.name;

        Object.keys(row)
        .forEach(h=>allHeaders.add(h));

        finalRows.push(row);
    }

    showTable();
}

async function extractText(file){

    const buffer=
    await file.arrayBuffer();

    const pdf=
    await pdfjsLib
    .getDocument(
      new Uint8Array(buffer)
    ).promise;

    let fullText="";

    for(let p=1;p<=pdf.numPages;p++){

        const page=
        await pdf.getPage(p);

        const content=
        await page.getTextContent();

        fullText +=
        content.items
        .map(x=>x.str)
        .join(" ");

        fullText+="\n";
    }

    return fullText;
}

function parseKeyValue(text){

    const obj={};

    const regex=
    /([A-Za-z0-9()\/\-\.\s]+?)\s*:\s*([^:\n]+?)(?=\s+[A-Za-z0-9()\/\-\.\s]+?\s*:|$)/g;

    let match;

    while(
      (match=regex.exec(text))
      !== null
    ){

        let key=
        match[1]
        .replace(/\s+/g,' ')
        .trim();

        let value=
        match[2]
        .replace(/\s+/g,' ')
        .trim();

        if(
          key.length>0 &&
          value.length>0
        ){
            obj[key]=value;
        }
    }

    return obj;
}

function showTable(){

    let headers=
    Array.from(allHeaders);

    let html="<table>";

    html+="<tr>";

    headers.forEach(h=>{
        html+="<th>"+h+"</th>";
    });

    html+="</tr>";

    finalRows.forEach(r=>{

        html+="<tr>";

        headers.forEach(h=>{

            html+="<td>"+(r[h]||"")+"</td>";

        });

        html+="</tr>";
    });

    html+="</table>";

    document
    .getElementById("preview")
    .innerHTML=html;
}

function downloadExcel(){

    if(finalRows.length===0){
        alert("No Data");
        return;
    }

    let headers=
    Array.from(allHeaders);

    let excelData=[];

    finalRows.forEach(r=>{

        let row={};

        headers.forEach(h=>{

            row[h]=r[h] || "";

        });

        excelData.push(row);
    });

    const ws=
    XLSX.utils.json_to_sheet(
        excelData
    );

    const wb=
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Employee Data"
    );

    XLSX.writeFile(
        wb,
        "Employee_Details.xlsx"
    );
}

</script>

</body>
</html>
