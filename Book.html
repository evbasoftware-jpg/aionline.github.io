<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Viewer</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f7ff;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* Button Style */

.btn{
display:block;
width:37%;
background:linear-gradient(90deg,#d7820b,#00C2FF);  
color:white;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
cursor:pointer;
font-size:21px;
font-weight:500;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* Zoom Controls */

.controls{
margin-top:15px;
}

.controls button{
padding:8px 15px;
margin-right:5px;
background:#0B5ED7;
color:white;
font-size:17px;
border:none;
border-radius:5px;
cursor:pointer;
}

.controls button:hover{
background:#084298;
}

/* Viewer */

.viewer-box{
overflow:auto;
border:2px solid #ddd;
margin-top:20px;
height:80vh;
}

iframe{
width:100%;
height:100%;
border:none;
transform-origin:0 0;
}

</style>

</head>

<body>

<div class="container">

<h2>📄 Select Document</h2>

<button class="btn" onclick="openDoc(1)">
Class - IV Bhasha Path (Bengali)
</button>

<button class="btn" onclick="openDoc(2)">
Class - IV Amader Paribesh (Bengali)
</button>

<button class="btn" onclick="openDoc(3)">
Class - IV Amar Ganit (Bengali)
</button>
  <br><br>
<div class="controls">
<button onclick="zoomIn()">🔍 Zoom In</button>
<button onclick="zoomOut()">🔎 Zoom Out</button>
<button onclick="resetZoom()">♻ Reset</button>
</div>

<div class="viewer-box">
<iframe id="viewer"></iframe>
</div>

</div>

<script>

let zoom=1;

function openDoc(option){

  //PDF file view
if(option==1){
document.getElementById("viewer").src=
"https://docs.google.com/file/d/1I1bgM88jV2HoaWga2bbzYbZ4L9LQfA78/preview";
}

    //PDF file view
if(option==2){
document.getElementById("viewer").src=
"https://docs.google.com/file/d/12YMGWDo7uuZwXJx3KTBS9fm9tsDIR4tA/preview";
}
  
  //word file view
//if(option==2){
//document.getElementById("viewer").src=
//"https://docs.google.com/document/d/1oBAZNYKznn9dvMXwNLAfgPMtM4ibfaZg/preview?usp=embed_google";
//}
  
  //PDF file view
if(option==3){
document.getElementById("viewer").src=
"https://drive.google.com/file/d/1Vz-ZcHz2Jg28453VT-AhCvqwSkpzTPeK/preview?usp=embed_google";
}
}

function zoomIn(){
zoom+=0.1;
document.getElementById("viewer").style.transform="scale("+zoom+")";
}

function zoomOut(){
zoom-=0.1;
document.getElementById("viewer").style.transform="scale("+zoom+")";
}

function resetZoom(){
zoom=1;
document.getElementById("viewer").style.transform="scale(1)";
}

</script>

</body>
</html>
