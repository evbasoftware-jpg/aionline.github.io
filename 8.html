<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WB Salary Calculation</title>

<style>
body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 0; }
h2 { text-align: center; margin: 10px 0; }

.controls-container {
    position: sticky;
    top: 0;
    z-index: 1001;
    background: #f5f5f5;
    padding: 10px 15px;
    border-bottom: 2px solid #ccc;
}

.controls {
    background: #fff;
    padding: 15px;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.table-container { padding: 15px; }

table { 
    width: 100%; 
    border-collapse: separate; 
    border-spacing: 0; 
    background: #fff; 
    font-size: 12px; 
}

th, td { 
    border: 1px solid #ccc; 
    padding: 6px 4px; 
    text-align: center; 
}

thead th {
    position: sticky;
    top: 0; 
    background: #fcfcd9 !important;
    z-index: 1000;
    box-shadow: inset 0 1px 0 #ccc, inset 0 -1px 0 #ccc;
}

.ropa-header { 
    background: #d9fcf8; 
    color: black; 
    font-weight: bold; 
    text-align: left; 
    padding: 8px 15px; 
}

.total-row {
    background: #e2e3e5;
    font-weight: bold;
}

.edit-input { width: 60px; text-align: center; border: 1px solid transparent; background: transparent; }
.edit-input:focus { border: 1px solid #007bff; background: #fff; outline: none; }
</style>
</head>

<body>

<div class="controls-container" id="topPanel">
    <h2>WB Salary Calculator</h2>
    <div class="controls">
        DOJ: <input type="date" id="dojInput" onchange="autoFillBasicAndROPA()">
        ,&emsp; DOR: <input type="date" id="dorInput">
                
        <b>,&emsp;Category (Joining):</b>
        <select id="category" onchange="autoFillBasicAndROPA()" style="text-align: center;">
            <option value="A">A &emsp;</option>
            <option value="B">B</option>
            <option value="C">C</option>
        </select><br><br>
         Starting Basic: <input type="number" id="basicInput" value="0">
        ,&emsp;A Category Date: <input type="date" id="aDate">
        ,&emsp;Promotion Date: <input type="date" id="pDate">
        <br><br>

        ROPA Option Dates:
        1981 <input type="date" id="r1981" value="1981-04-01">
        ,&emsp;1990 <input type="date" id="r1990" value="1986-01-01">
        ,&emsp;1998 <input type="date" id="r1998" value="1996-01-01"><br>
        &ensp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp; 
        2009 <input type="date" id="r2009" value="2006-01-01">
        ,&emsp;2019 <input type="date" id="r2019" value="2020-01-01">

        <br><br>
        <b>Career Increment (Select):</b><br>
        <label><input type="checkbox" class="incOpt" value="10">10Y,&emsp;</label>
        <label><input type="checkbox" class="incOpt" value="18">18Y,&emsp;</label>
        <label><input type="checkbox" class="incOpt" value="20">20Y</label>
        <br><br>
        <button onclick="generate()">Generate</button>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Basic</th>
                <th>DA%</th>
                <th>HRA%</th>
                <th>Addl Alw</th>
                <th>DA</th>
                <th>HRA</th>
                <th>MA</th>
                <th>IR</th>
                <th>Gross</th>
                <th>GPF</th>
                <th>PTAX</th>
                <th>GI</th>
                <th>Net</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>
const ENTRY_PAY = {
    1981: { A: 300,  B: 280,  C: 260 },
    1990: { A: 1040, B: 980,  C: 920 },
    1998: { A: 3350, B: 3150, C: 3000 },
    2009: { A: 8840, B: 8160, C: 7680 }, 
    2019: { A: 28900, B: 27000, C: 21000 } 
};

window.addEventListener('load', updateHeaderTop);
window.addEventListener('resize', updateHeaderTop);

function updateHeaderTop() {
    const topPanel = document.getElementById('topPanel');
    if(topPanel){
        const topHeight = topPanel.offsetHeight;
        const ths = document.querySelectorAll('thead th');
        ths.forEach(th => th.style.top = topHeight + 'px');
    }
}

function autoFillBasicAndROPA() {
    const dojStr = el("dojInput").value;
    const cat = el("category").value;
    if (!dojStr) return;

    const doj = new Date(dojStr);
    const cutoff1986 = new Date("1986-01-01");
    
    if (doj < cutoff1986) {
        let d = doj.getDate();
        let m = doj.getMonth() + 1;
        let mmStr = m < 10 ? '0' + m : m;
        let ddStr = d < 10 ? '0' + d : d;
        
        el("r1990").value = `1986-${mmStr}-${ddStr}`;
        el("r1998").value = `1996-${mmStr}-01`;
    } else {
        el("r1990").value = "1986-01-01";
        el("r1998").value = "1996-01-01";
    }

    const ropaFields = [
        { id: "r1981", date: new Date("1990-02-28"), year: 1981 },
        { id: "r1990", date: new Date("1999-02-28"), year: 1990 },
        { id: "r1998", date: new Date("2009-03-31"), year: 1998 },
        { id: "r2009", date: new Date("2019-12-31"), year: 2009 },
        { id: "r2019", date: new Date("2099-01-01"), year: 2019 }
    ];

    let currentRopaFound = false;
    for (let i = 0; i < ropaFields.length; i++) {
        let field = el(ropaFields[i].id);
        
        if ((ropaFields[i].id === "r1990" || ropaFields[i].id === "r1998") && doj < cutoff1986) {
            if (doj < ropaFields[i].date) currentRopaFound = true;
            continue;
        }

        if (!currentRopaFound && doj < ropaFields[i].date) {
            field.value = dojStr;
            el("basicInput").value = ENTRY_PAY[ropaFields[i].year][cat];
            currentRopaFound = true;
        } else if (!currentRopaFound) {
            field.value = "";
        }
    }
}

function isCareerIncSelected(years) {
    const checkboxes = document.querySelectorAll('.incOpt');
    for (let cb of checkboxes) {
        if (cb.value == years && cb.checked) return true;
    }
    return false;
}

// ১৮ বছরের বিশেষ স্কেল পরিবর্তন ও নেক্সট উচ্চতর বেসিক খোঁজার লজিক
function get18YearScaleBenefit(basic, ropaYear, currentScaleType) {
    let targetScaleType = "A";
    if (currentScaleType === "A" || currentScaleType === "high") {
        targetScaleType = "high";
    }

    let singleIncPay = getScaleIncrementByScaleType(basic, ropaYear, currentScaleType);

    if (ropaYear === 2019) {
        let matrix = SCALE[2019][targetScaleType] || SCALE[2019]["A"];
        for (let i = 0; i < matrix.length; i++) {
            if (matrix[i] >= singleIncPay) return { basic: matrix[i], scale: targetScaleType };
        }
        let computed = Math.ceil((singleIncPay * 1.03) / 100) * 100;
        return { basic: computed, scale: targetScaleType };
    }
    
    if (ropaYear === 2009) {
        let newVal = singleIncPay * 1.03;
        let intVal = Math.floor(newVal); 
        let round10 = Math.round(newVal / 10) * 10;
        let computed = 0;
        if (intVal === round10) {
            computed = round10;
        } else {
            let mod10 = newVal % 10;
            computed = mod10 > 0 ? (newVal - mod10 + 10) : newVal;
        }
        return { basic: Math.round(computed), scale: targetScaleType };
    }

    let targetScale = SCALE[ropaYear] ? SCALE[ropaYear][targetScaleType] : null;
    if (!targetScale) return { basic: singleIncPay, scale: targetScaleType };

    for (let i = 0; i < targetScale.length; i += 2) {
        if (targetScale[i] >= singleIncPay) {
            return { basic: targetScale[i], scale: targetScaleType };
        }
    }
    return { basic: singleIncPay, scale: targetScaleType };
}

// --- বাৎসরিক এবং ক্যারিয়ার ইনক্রিমেন্ট লজিক ---
function getScaleIncrementByScaleType(basic, ropaYear, scaleType) {
    if (ropaYear === 2019) {
        let matrix = SCALE[2019][scaleType];
        if (matrix) {
            for (let i = 0; i < matrix.length - 1; i++) {
                if (basic === matrix[i]) return matrix[i + 1];
            }
            return Math.ceil((basic * 1.03) / 100) * 100;
        }
    }
    
    if (ropaYear === 2009) {
        let newVal = basic * 1.03;
        let intVal = Math.floor(newVal);             
        let round10 = Math.round(newVal / 10) * 10;  
        
        if (intVal === round10) {
            return round10;
        } else {
            let mod10 = newVal % 10;                 
            if (mod10 > 0) {
                return (newVal - mod10) + 10;
            } else {
                return newVal;
            }
        }
    }
    
    let currentScale = SCALE[ropaYear] ? SCALE[ropaYear][scaleType] : null;
    if (!currentScale) return basic;

    for (let i = 0; i < currentScale.length - 2; i += 2) {
        let stageStart = currentScale[i];
        let stageInc = currentScale[i + 1];
        let stageEnd = currentScale[i + 2];
        if (basic >= stageStart && basic < stageEnd) return basic + stageInc;
    }
    return basic;
}

function getScaleIncrement(basic, ropaYear) {
    let cat = el("category").value; 
    return getScaleIncrementByScaleType(basic, ropaYear, cat);
}

function generate() {
    const dojInput = new Date(el("dojInput").value);
    const dorInput = new Date(el("dorInput").value);
    let currentBasic = +el("basicInput").value;

    if (isNaN(dojInput) || isNaN(dorInput)) return alert("Please select DOJ and DOR");

    rows = [];
    const ROPA_CONFIG = [
        { name: "ROPA 1981", start: el("r1981").value, end: "1990-02-28", year: 1981, ma: 15 },
        { name: "ROPA 1990", start: el("r1990").value, end: "1999-02-28", year: 1990, ma: 30 },
        { name: "ROPA 1998", start: el("r1998").value, end: "2009-03-31", year: 1998, ma: 100 },
        { name: "ROPA 2009", start: el("r2009").value, end: "2019-12-31", year: 2009, ma: 300 },
        { name: "ROPA 2019", start: el("r2019").value, end: "2099-12-31", year: 2019, ma: 500 }
    ];

    let hasStarted = false;
    let currentScaleType = el("category").value; 

    ROPA_CONFIG.forEach((config, idx) => {
        if (!config.start) return; 
        let ropaStart = new Date(config.start);
        let ropaEnd = new Date(config.end);
        if (ropaEnd > dorInput) ropaEnd = dorInput;
        if (dojInput > ropaEnd) return;

        let actualStart = !hasStarted && dojInput >= ropaStart ? new Date(dojInput) : new Date(ropaStart);
        hasStarted = true;

        rows.push({ isHeader: true, title: config.name });

        let currentLoopDate = new Date(actualStart);
        
        let dojMonth = dojInput.getMonth(); 
        let dojYear = dojInput.getFullYear();
        let dojDay = dojInput.getDate(); 

        let isFirstMonthOfRopa = true; 

        while (currentLoopDate <= ropaEnd) {
            let monthDate = new Date(currentLoopDate);
            let m = monthDate.getMonth();
            let y = monthDate.getFullYear();

            if (rows.length > 0 && !rows[rows.length-1].isHeader) {
                let diffYears = y - dojYear;
                let isCareerMonth = (m === dojMonth && diffYears > 0);
                
                if (isCareerMonth && (diffYears === 10 || diffYears === 20) && isCareerIncSelected(diffYears)) {
                    currentBasic = getScaleIncrementByScaleType(currentBasic, config.year, currentScaleType);
                    currentBasic = getScaleIncrementByScaleType(currentBasic, config.year, currentScaleType);
                } 
                else if (isCareerMonth && diffYears === 18 && isCareerIncSelected(18)) {
                    let benefit = get18YearScaleBenefit(currentBasic, config.year, currentScaleType);
                    currentBasic = benefit.basic;
                    currentScaleType = benefit.scale; 
                }
                else if (config.year >= 2009) {
                    if (m === 6) { 
                        if (dojMonth <= 6) {
                            if (y === dojYear) {
                                let diffDays = (monthDate - dojInput) / (1000 * 60 * 60 * 24);
                                if (diffDays >= 181) currentBasic = getScaleIncrementByScaleType(currentBasic, config.year, currentScaleType);
                            } else {
                                currentBasic = getScaleIncrementByScaleType(currentBasic, config.year, currentScaleType);
                            }
                        } else {
                            if (y > dojYear) currentBasic = getScaleIncrementByScaleType(currentBasic, config.year, currentScaleType);
                        }
                    }
                } else {
                    if (m === dojMonth && y > dojYear) {
                        currentBasic = getScaleIncrementByScaleType(currentBasic, config.year, currentScaleType);
                    }
                }
            }

            currentBasic = Math.round(currentBasic);

            let daRate = getDA(monthDate);
            let hraRate = 0;
            if (monthDate >= new Date("2020-01-01")) hraRate = 0.12;
            else if (monthDate >= new Date("2009-04-01")) hraRate = 0.15;
            else if (monthDate >= new Date("1998-01-01")) hraRate = 0.15;

            let rowObj = {
                date: new Date(monthDate),
                basic: currentBasic,
                daRate, hraRate, ADD: 0, DA: 0, HRA: 0, MA: config.ma, IR: 0, 
                GPF: Math.round(currentBasic * 0.06), GI: 60, PTAX: 0, ropaYear: config.year,
                calculatedScale: currentScaleType // এডিটের পর ট্র্যাক রাখার জন্য স্থায়ীভাবে সেভ করা হলো
            };
            reCalcRow(rowObj, true);
            rows.push(rowObj);

            if (config.year === 1981) {
                currentLoopDate.setMonth(currentLoopDate.getMonth() + 1);
                currentLoopDate.setDate(dojDay); 
            } else {
                if (isFirstMonthOfRopa) {
                    currentLoopDate.setMonth(currentLoopDate.getMonth() + 1);
                    currentLoopDate.setDate(1); 
                    isFirstMonthOfRopa = false;
                } else {
                    currentLoopDate.setMonth(currentLoopDate.getMonth() + 1);
                }
            }

            if (currentLoopDate > dorInput) break;
        }

        if (idx < ROPA_CONFIG.length - 1) {
            let nextRopaYear = ROPA_CONFIG[idx+1].year;
            let fitmentPay = currentBasic * FITMENT[nextRopaYear];
            let entryPay = ENTRY_PAY[nextRopaYear] ? ENTRY_PAY[nextRopaYear][currentScaleType] : 0;
            
            currentBasic = Math.max(fitmentPay, entryPay);
            currentBasic = Math.round(currentBasic);
        }
    });
    render();
}

function formatDate(dateObj) {
    let d = dateObj.getDate();
    let m = dateObj.getMonth() + 1;
    let y = dateObj.getFullYear();
    return (d < 10 ? '0' + d : d) + '/' + (m < 10 ? '0' + m : m) + '/' + y;
}

const SCALE = {
    1981: { 
        A: [300, 10, 400, 15, 565, 20, 685], 
        B: [280, 8, 304, 10, 394, 12, 442, 15, 557, 20, 617], 
        C: [260, 7, 295, 8, 311, 10, 421, 12, 481, 14, 597],
        high: [340, 10, 400, 15, 550, 20, 750]        
    },
    1990: { 
        A: [1040, 25, 1215, 30, 1485, 35, 1590, 40, 1670, 50, 1920], 
        B: [980, 25, 1230, 30, 1500, 35, 1675, 40, 1755], 
        C: [920, 21, 1067, 25, 1242, 30, 1512, 35, 1617], 
        high: [1140, 30, 1440, 35, 1580, 40, 1660, 50, 2160]
    },
    1998: { 
        A: [3350, 90, 3800, 100, 4700, 125, 6325], 
        B: [3150, 80, 3390, 90, 4380, 100, 5680], 
        C: [3000, 75, 3450, 80, 4330, 90, 5230], 
        high: [3600, 100, 4200, 125, 5700, 150, 7050] 
    },
    2019: {
        A: [28900, 29800, 30700, 31600, 32500, 33500, 34500, 35500, 36600, 37700, 38800, 40000, 41200, 42400, 43700, 45000, 46400, 47800, 49200, 50700, 52200, 53800, 55400, 57100, 58800, 60600, 62400, 64300, 66200, 68200, 70200, 72300, 74500],
        B: [27000, 27800, 28600, 29500, 30400, 31300, 32200, 33200, 34200, 35200, 36300, 37400, 38500, 39700, 40900, 42100, 43400, 44700, 46000, 47400, 48800, 50300, 51800, 53400, 55000, 56700, 58400, 60200, 62000, 63900, 65800, 67800, 69800],
        C: [21000, 21600, 22200, 22900, 23600, 24300, 25000, 25800, 26600, 27400, 28200, 29000, 29900, 30800, 31700, 32700, 33700, 34700, 35700, 36800, 37900, 39000, 40200, 41400, 42600, 43900, 45200, 46600, 48000, 49400, 50900, 52400, 54000],
        high: [32100, 33100, 34100, 35100, 36200, 37300, 38400, 39600, 40800, 42000, 43300, 44600, 45900, 47300, 48700, 50200, 51700, 53300, 54900, 56500, 58200, 59900, 61700, 63600, 65500, 67500, 69500, 71600, 73700, 75900, 78200, 80500, 82900]
    }
};

const FITMENT = {1990:1.1, 1998:1.25, 2009:1.86, 2019:2.57};
function el(id){ return document.getElementById(id); }

const DA_DATA = [
    ["1987-03-01",4],["1987-12-01",8],["1988-06-01",13],["1989-02-01",18],["1989-06-01",23],["1989-11-01",29],["1990-06-01",34],["1990-12-01",38],["1991-04-01",43],["1992-01-01",51],["1992-11-01",60],["1993-07-01",71],["1993-12-01",83],["1994-05-01",92],["1994-11-01",97],["1995-02-01",104],["1995-06-01",114],["1995-12-01",125],["1996-04-01",136],["1996-10-01",148],["1997-08-01",159],["1997-12-01",170],["1998-04-01",182.4],["1997-04-01",0],["1997-08-01",4],["1997-12-01",8],["1998-04-01",13],["1998-11-01",22],["1999-08-01",32],["2000-04-01",37],["2000-10-01",38],["2001-07-01",41],["2003-07-01",45],["2004-09-01",49],["2005-04-01",52],["2005-09-01",55],["2005-12-01",59],["2006-03-01",61],["2006-07-01",64],["2006-09-01",67],["2007-01-01",71],["2007-04-01",24],["2008-01-01",29],["2008-06-01",35],["2008-11-01",41],["2009-03-01",47],["2008-04-01",2],["2008-06-01",6],["2008-11-01",9],["2009-03-01",12],["2009-04-01",16],["2009-12-01",22],["2010-04-01",27],["2010-12-01",35],["2012-01-01",45],["2013-01-01",52],["2014-01-01",58],["2015-01-01",65],["2016-01-01",75],["2017-01-01",85],["2018-01-01",100],["2019-01-01",125],["2020-01-01",0],["2021-01-01",3],["2023-03-01",6],["2024-01-01",10],["2024-04-01",14],["2025-04-01",18],["2026-04-01",22]
];

function getDA(date){
    let d = new Date(date);
    let rate = 0;
    for(let i=0;i<DA_DATA.length;i++){
        let eff = new Date(DA_DATA[i][0]);
        if(d >= eff) rate = DA_DATA[i][1];
    }
    return rate/100;
}

function getDefaultPTAX(gross) {
    if (gross <= 6000) return 40;
    if (gross <= 7000) return 45;
    if (gross <= 8000) return 50;
    if (gross <= 9000) return 90;
    if (gross <= 15000) return 110;
    if (gross <= 25000) return 130;
    if (gross <= 40000) return 150;
    return 200;
}

function reCalcRow(row, useDefaultPTAX = false) {
    row.basic = Math.round(row.basic); 
    if (row.hraRate > 0) {
        row.HRA = Math.round(row.basic * row.hraRate);
        if (row.ropaYear === 2019 && row.HRA > 12000) row.HRA = 12000;
        else if (row.ropaYear === 2009 && row.HRA > 6000) row.HRA = 6000;
    } else {
        row.HRA = 0;
    }
    row.DA = Math.round(row.basic * row.daRate);
    row.gross = row.basic + row.DA + row.HRA + row.MA + row.ADD + row.IR;
    if (useDefaultPTAX) row.PTAX = getDefaultPTAX(row.gross);
    row.net = row.gross - (row.GPF + row.PTAX + row.GI);
}

// --- সংশোধিত এবং সম্পূর্ণরূপে ফিক্সড করা updateValue ফাংশন ---
function updateValue(index, field, value) {
    let val = parseFloat(value) || 0;
    rows[index][field] = val;
    reCalcRow(rows[index], (field === 'basic'));

    if (field === 'basic') {
        let lastBasic = val;
        let dojMonth = new Date(el("dojInput").value).getMonth();
        let dojYear = new Date(el("dojInput").value).getFullYear();
        
        // এডিট হওয়া নির্দিষ্ট রো থেকে তার পূর্বের জেনারেট হওয়া স্কেল টাইপটি তোলা হচ্ছে
        let currentScaleType = rows[index].calculatedScale || el("category").value; 

        for (let i = index + 1; i < rows.length; i++) {
            if (rows[i].isHeader) {
                let nextRopaYear = rows[i+1]?.ropaYear;
                if(nextRopaYear) {
                    let fitmentPay = lastBasic * FITMENT[nextRopaYear];
                    let entryPay = ENTRY_PAY[nextRopaYear] ? ENTRY_PAY[nextRopaYear][currentScaleType] : 0;
                    lastBasic = Math.max(fitmentPay, entryPay);
                }
                continue;
            }

            let m = rows[i].date.getMonth();
            let y = rows[i].date.getFullYear();

            if (rows[i].ropaYear === rows[i-1].ropaYear) {
                let diffYears = y - dojYear;
                let isCareerMonth = (m === dojMonth && diffYears > 0);

                if (isCareerMonth && (diffYears === 10 || diffYears === 20) && isCareerIncSelected(diffYears)) {
                    lastBasic = getScaleIncrementByScaleType(lastBasic, rows[i].ropaYear, currentScaleType);
                    lastBasic = getScaleIncrementByScaleType(lastBasic, rows[i].ropaYear, currentScaleType);
                }
                else if (isCareerMonth && diffYears === 18 && isCareerIncSelected(18)) {
                    let benefit = get18YearScaleBenefit(lastBasic, rows[i].ropaYear, currentScaleType);
                    lastBasic = benefit.basic;
                    currentScaleType = benefit.scale;
                }
                else if (rows[i].ropaYear >= 2009) {
                    if (m === 6) { 
                        if (dojMonth <= 6) {
                            if (y === dojYear) {
                                let diffDays = (rows[i].date - new Date(el("dojInput").value)) / (1000 * 60 * 60 * 24);
                                if (diffDays >= 181) lastBasic = getScaleIncrementByScaleType(lastBasic, rows[i].ropaYear, currentScaleType);
                            } else {
                                lastBasic = getScaleIncrementByScaleType(lastBasic, rows[i].ropaYear, currentScaleType);
                            }
                        } else if (y > dojYear) {
                            lastBasic = getScaleIncrementByScaleType(lastBasic, rows[i].ropaYear, currentScaleType);
                        }
                    }
                } else {
                    if (m === dojMonth) {
                        if (rows[i-1].date.getMonth() !== m) {
                            lastBasic = getScaleIncrementByScaleType(lastBasic, rows[i].ropaYear, currentScaleType);
                        }
                    }
                }
            }

            lastBasic = Math.round(lastBasic);
            rows[i].basic = lastBasic;
            rows[i].calculatedScale = currentScaleType; // প্রতিটি রো-তে রানিং স্কেল সিঙ্ক রাখা হলো
            reCalcRow(rows[i], true);
        }
    } else {
        for (let i = index + 1; i < rows.length; i++) {
            if (rows[i].isHeader) continue;
            rows[i][field] = val;
            reCalcRow(rows[i], false);
        }
    }
    render();
}

function render(){
    let tbody = el("tbody");
    tbody.innerHTML = "";
    
    let totalBasic = 0, totalADD = 0, totalDA = 0, totalHRA = 0, totalMA = 0, totalIR = 0, totalGross = 0, totalGPF = 0, totalPTAX = 0, totalGI = 0, totalNet = 0;
    let hasDataRows = false;

    rows.forEach((r, idx) => {
        let tr = document.createElement("tr");
        if(r.isHeader) {
            tr.innerHTML = `<td colspan="14" class="ropa-header">${r.title}</td>`;
        } else {
            hasDataRows = true;
            totalBasic += r.basic;
            totalADD += r.ADD;
            totalDA += r.DA;
            totalHRA += r.HRA;
            totalMA += r.MA;
            totalIR += r.IR;
            totalGross += r.gross;
            totalGPF += r.GPF;
            totalPTAX += r.PTAX;
            totalGI += r.GI;
            totalNet += r.net;

            tr.innerHTML = `
                <td>${formatDate(r.date)}</td>
                <td><input type="number" class="edit-input" value="${r.basic}" onchange="updateValue(${idx}, 'basic', this.value)"></td>
                <td>${(r.daRate*100).toFixed(0)}%</td>
                <td>${(r.hraRate*100).toFixed(0)}%</td>
                <td>${r.ADD}</td>
                <td>${r.DA}</td>
                <td><input type="number" class="edit-input" value="${r.HRA}" onchange="updateValue(${idx}, 'HRA', this.value)"></td>
                <td><input type="number" class="edit-input" value="${r.MA}" onchange="updateValue(${idx}, 'MA', this.value)"></td>
                <td>${r.IR}</td>
                <td>${r.gross}</td>
                <td><input type="number" class="edit-input" value="${r.GPF}" onchange="updateValue(${idx}, 'GPF', this.value)"></td>
                <td><input type="number" class="edit-input" value="${r.PTAX}" onchange="updateValue(${idx}, 'PTAX', this.value)"></td>
                <td><input type="number" class="edit-input" value="${r.GI}" onchange="updateValue(${idx}, 'GI', this.value)"></td>
                <td>${r.net}</td>`;
        }
        tbody.appendChild(tr);
    });

    if (hasDataRows) {
        let totalTr = document.createElement("tr");
        totalTr.className = "total-row";
        totalTr.innerHTML = `
            <td>TOTAL</td>
            <td>${totalBasic}</td>
            <td>-</td>
            <td>-</td>
            <td>${totalADD}</td>
            <td>${totalDA}</td>
            <td>${totalHRA}</td>
            <td>${totalMA}</td>
            <td>${totalIR}</td>
            <td>${totalGross}</td>
            <td>${totalGPF}</td>
            <td>${totalPTAX}</td>
            <td>${totalGI}</td>
            <td>${totalNet}</td>
        `;
        tbody.appendChild(totalTr);
    }
}
</script>
          
</body>
