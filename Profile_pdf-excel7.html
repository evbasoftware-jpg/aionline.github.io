async function extractText(file){

    const buffer=
    await file.arrayBuffer();

    const pdf=
    await pdfjsLib
    .getDocument(
      new Uint8Array(buffer)
    ).promise;

    let fullText="";

    for(let p=1;p<=pdf.numPages;p++){

        const page=
        await pdf.getPage(p);

        const content=
        await page.getTextContent();

        fullText +=
    content.items
    .map(x => x.str)
    .join("\n");

        fullText+="\n";
    }

    return fullText;
}

function parseKeyValue(text){

    const obj = {};
    
    const previousBlock = text.match(
/DETAILS OF PREVIOUS EMPLOYMENT(.*?)(?:Status of previous of employment, if any|Opted Under DCRB Scheme|$)/is);
    
    if(previousBlock){

    let pText = previousBlock[1]
        .replace(/\s+/g," ")
        .trim();

    console.log("PREVIOUS =", pText);

    pText = pText.replace(
        /^District\s+Circle\s+School\s+Designation\s+Qualification\s+From\s+Date\s+To\s+Date\s+Transfer\s+Memo\s+No\.\s+Transfer\s+Memo\s+No\.\s+Date\s*/i,
        ""
    );

    console.log("AFTER CLEAN =", pText);
const dateMatches = pText.match(/\d{2}-\d{2}-\d{4}/g);

if(dateMatches && dateMatches.length >= 3){

    obj["Previous From Date"] = dateMatches[0];
    obj["Previous To Date"] = dateMatches[1];
    obj["Previous Transfer Memo No. Date"] = dateMatches[2];

    const beforeDates = pText.split(dateMatches[0])[0].trim();

    const memoMatch = pText.match(
        /([A-Z]+\/[A-Z]+\/[0-9()\/]+\/[0-9]+)/i
    );

    if(memoMatch){
        obj["Previous Transfer Memo No."] = memoMatch[1];
    }

    const desigMatch = beforeDates.match(
        /\b(AT|HM|AHM|TIC)\b/
    );

    if(desigMatch){

        obj["Previous Designation"] = desigMatch[1];

        const parts = beforeDates.split(desigMatch[1]);

        const left = parts[0].trim();
        const right = parts[1].trim();

        const leftWords = left.split(/\s+/);

        obj["Previous District"] = leftWords[0] || "";
        obj["Previous Circle"] = leftWords[1] || "";

        obj["Previous School"] =
            leftWords.slice(2).join(" ");

        obj["Previous Qualification"] = right;
    }
}
}
    
    const presentBlock = text.match(
/PRESENT ADDRESS(.*?)(?:PERMANENT ADDRESS|CONTACT DETAILS)/is
);

const permanentBlock = text.match(
/PERMANENT ADDRESS(.*?)(?:CONTACT DETAILS|PROFESSIONAL DETAILS)/is
);
    
    

    // PRESENT ADDRESS
if(presentBlock){

    const pText = presentBlock[1];

        "State",
        "House No.",
        "Street",
        "Town/ Village",
        "Post Office",
        "PIN",
        "District",
        "Sub Division",
        "Block",
        "Police Station"
    ];

        const next = fields.slice(index+1)
            .map(f=>f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'))
            .join("|");

        const rx = new RegExp(
            field.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') +
            "\\s*:\\s*(.*?)\\s*(?=(" +
            next +
            ")\\s*:|$)",
            "is"
        );

        const m = pText.match(rx);

        }

}
    
  // PERMANENT ADDRESS

        "State",
        "House No.",
        "Street",
        "Town/ Village",
        "Post Office",
        "PIN",
        "District",
        "Sub Division",
        "Block",

        // =================================================================

    // =================================================================
    const originalText = text;
    text = text.replace(/\s+/g, " ").trim();

    // ১. Circle এক্সট্রাক্ট করা
    const circleMatch = originalText.match(/([A-Z0-9()\-]+(?:\s+[A-Z0-9()\-]+)*\s+CIRCLE,\s*[A-Z]+)/i);
    if (circleMatch) {
        obj["Circle"] = circleMatch[1].replace(/^OF\s+WB\s+/i, "").trim();
    }

    // ২. School Name এক্সট্রাক্ট করা (লুপের ওভাররাইট থেকে বাঁচাতে আলাদা লজিক)

        const backupSchoolMatch = text.match(/CIRCLE,\s*([A-Z0-9\s().\s-]+?(?:PRIMARY SCHOOL|JUNIOR BASIC SCHOOL|HIGH SCHOOL|MADRASAH|MSK|SSK|HIGH\s+SCHOOL|JR\.\s+HIGH))/i);
        if (backupSchoolMatch) {
            obj["School Name"] = backupSchoolMatch[1].replace(/\s+/g, " ").trim();
        }
    }

    // ৩. অন্যান্য সব ফীডের জন্য লুপ চালানো (School Name বাদ দিয়ে)
    for(let i=0; i<HEADERS.length; i++){
        const current = HEADERS[i];
        
        // অত্যন্ত গুরুত্বপূর্ণ: "Circle" এবং "School Name" যেহেতু উপরে বের করেছি, 
        // তাই লুপে এদের আবার প্রসেস করে ফাঁকা করা যাবে না।
        if (current === "Circle" || current === "School Name") {
            continue; 
        }

        const nextHeaders = HEADERS
            .slice(i+1)
            .map(h => h.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'))
            .join("|");

        let regex;

        if(nextHeaders){
            regex = new RegExp(
                current.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') +
                "\\s*:\\s*(.*?)\\s*(?=(" + nextHeaders +
                ")\\s*:|PERSONAL DETAILS|PERMANENT ADDRESS|CONTACT DETAILS|PROFESSIONAL DETAILS|DETAILS OF PREVIOUS EMPLOYMENT|Finalized By DPSC|osms\\.wbsed\\.gov\\.in|$)",
                "i"
            );
        } else {
            regex = new RegExp(
                current.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') +
                "\\s*:\\s*(.*)$",
                "i"
            );
        }

        const match = text.match(regex);

        if(match){
            obj[current] = match[1].replace(/\s+/g," ").trim();
        }
    }

    return obj;
}

        // ১. Circle এক্সট্রাক্ট করা
        const circleMatch = originalText.match(/([A-Z0-9()\-]+(?:\s+[A-Z0-9()\-]+)*\s+CIRCLE,\s*[A-Z]+)/i);
        if (circleMatch) {
            obj["Circle"] = circleMatch[1].replace(/^OF\s+WB\s+/i, "").trim();
        }

        // ২. School Name এক্সট্রাক্ট করা (লুপের ওভাররাইট এড়াতে আলাদা লজিক)
        const schoolMatch = text.match(/CIRCLE,\s*(.*?)\s*School Name\s*:/i);
        if (schoolMatch) {
            obj["School Name"] = schoolMatch[1].replace(/\s+/g, " ").trim();
        } else {
            const backupSchoolMatch = text.match(/CIRCLE,\s*([A-Z0-9\s().\s-]+?(?:PRIMARY SCHOOL|JUNIOR BASIC SCHOOL|HIGH SCHOOL|MADRASAH|MSK|SSK|HIGH\s+SCHOOL|JR\.\s+HIGH))/i);
            if (backupSchoolMatch) {
                obj["School Name"] = backupSchoolMatch[1].replace(/\s+/g, " ").trim();
            }
        }
       
        // ৩. অন্যান্য ফীডগুলোর জন্য লুপ
        for(let i=0;i<HEADERS.length;i++){

            const current = HEADERS[i];

            // গুরুত্বপূর্ণ: Circle এবং School Name উপরে প্রসেস করা হয়েছে, তাই লুপে এগুলো স্কিপ করতে হবে
            if (current === "Circle" || current === "School Name") {
                continue;
            }

            const nextHeaders = HEADERS
                .slice(i+1)
                .map(h => h.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'))
                .join("|");

            let regex;

            if(nextHeaders){
                regex = new RegExp(
                    current.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') +
                    "\\s*:\\s*(.*?)\\s*(?=(" + nextHeaders +
                    ")\\s*:|PERSONAL DETAILS|PERMANENT ADDRESS|CONTACT DETAILS|PROFESSIONAL DETAILS|DETAILS OF PREVIOUS EMPLOYMENT|Finalized By DPSC|osms\\.wbsed\\.gov\\.in|$)",
                    "i"
                );
            }else{
                regex = new RegExp(
                    current.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') +
                    "\\s*:\\s*(.*)$",
                    "i"
                );
            }

            const match = text.match(regex);

            if(match){
                obj[current] = match[1].replace(/\s+/g," ").trim();
            }
        }

        return obj;
    }

    function showTable(){

        let headers = HEADERS;

        let html="<table>";

        html+="<tr>";

        headers.forEach(h=>{
            html+="<th>"+h+"</th>";
        });

        html+="</tr>";

        finalRows.forEach(r=>{

            html+="<tr>";

            headers.forEach(h=>{
                html+="<td>"+(r[h]||"")+"</td>";
            });

            html+="</tr>";
        });

        html+="</table>";

        document.getElementById("preview").innerHTML=html;
    }

    async function downloadExcel(){

        updateProgress(0, "Preparing Excel File...");
        
        if(finalRows.length===0){
            alert("No Data");
            return;
        }

        let headers = HEADERS;

        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet("Employee Data");

        worksheet.addRow(headers);
        worksheet.getRow(1).font = {bold:true};

        updateProgress(30, "Writing Data...");

        finalRows.forEach(r=>{
            worksheet.addRow(
                headers.map(h => r[h] || "")
            );
        });

        updateProgress(60, "Formatting Excel...");

        worksheet.eachRow(row => {
            row.eachCell(cell => {
                cell.alignment = {
                    wrapText: true,
                    vertical: "middle"
                };
            });
        });
        
        worksheet.eachRow((row)=>{
            row.eachCell((cell)=>{
                cell.border = {
                    top:{style:'thin'},
                    left:{style:'thin'},
                    bottom:{style:'thin'},
                    right:{style:'thin'}
                };
            });
        });

        worksheet.columns.forEach(column => {
            let maxLength = 0;
            column.eachCell({ includeEmpty: true }, cell => {
                const value = cell.value ? String(cell.value) : "";
                maxLength = Math.max( maxLength,value.length ); 
            });
            column.width = Math.min(Math.max(maxLength + 2, 10),40);
        });
        
        updateProgress(80, "Generating Excel...");
        
        const buffer = await workbook.xlsx.writeBuffer();

        updateProgress(100, "Excel Download Ready");
        
        const blob = new Blob([buffer],{type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});

        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Teacher_profile_PDF_To_Excel.xlsx";
        link.click();
    }

    function updateProgress(percent,text=""){

        const bar = document.getElementById("progressBar");
        const container = document.getElementById("progressContainer");
        const txt = document.getElementById("progressText");

        container.style.display="block";

        bar.style.width = percent + "%";
        bar.innerText = Math.round(percent) + "%";

        txt.innerText = text;

        if(percent>=100){
            setTimeout(()=>{
                container.style.display="none";
                bar.style.width="0%";
                bar.innerText="0%";
                txt.innerText="";
            },1500);
        }
    }
    
</script>
